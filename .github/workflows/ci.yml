name: Publish Minecraft Image to ECR

on:
  push:
    tags:
      - 'v*'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: cs312-minecraft-terraform

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Might want to Build the Docker image from ECR instead of pulling from Docker Hub
      # Build from Docker Hub for first time then change
      # Change to docker build -t ${{ env.ECR_REPOSITORY }}:${{ github.ref_name }} . and update the tag in the playbook.yml to match
      - name: Pull Minecraft image from Docker Hub
        run: docker pull itzg/minecraft-server:latest

          # Temporarily using the public image from Docker Hub for testing - update this to use the ECR image once CI/CD is working
          # change itzg/minecraft-server:latest to ${{ env.ECR_REPOSITORY }}:${{ github.ref_name }} once CI/CD is working
      - name: Smoke test
        run: |
          docker run -d --name mc-test \
            -e EULA=TRUE \
            -e MEMORY=512m \
            itzg/minecraft-server:latest
          echo "Waiting for server to start..."
          for i in $(seq 1 12); do
            sleep 10
            if docker logs mc-test 2>&1 | grep -q "Done"; then
              echo "Server started successfully"
              docker stop mc-test
              exit 0
            fi
            echo "Attempt $i/12..."
          done
          echo "Server failed to start"
          docker logs mc-test
          exit 1

      - name: Tag and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Change docker tag to ${{ env.ECR_REPOSITORY }}:${{ github.ref_name }} once CI/CD is working.
        run: |
          docker tag itzg/minecraft-server:latest \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}
